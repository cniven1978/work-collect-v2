# =============================================================
# 推送渠道配置
# 默认走 OpenClaw 绑定的飞书，无需在此填写
# 如需多渠道推送，填入对应 Webhook 并设 enabled: true
# =============================================================

# ---------------------------------------------------------------
# 飞书（主渠道，当前通过 OpenClaw 绑定）
# webhook 留空 = 走 OpenClaw 绑定
# webhook 填入 = 脚本直接推送（支持同时推）
# ---------------------------------------------------------------
feishu:
  enabled: true
  webhook: ""   # 留空则走 OpenClaw 绑定
  # 如需直推，填入飞书机器人 Webhook：
  # webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxx"

# ---------------------------------------------------------------
# Telegram（预留）
# ---------------------------------------------------------------
telegram:
  enabled: false
  bot_token: ""
  chat_id: ""

# ---------------------------------------------------------------
# 钉钉（预留）
# ---------------------------------------------------------------
dingtalk:
  enabled: false
  webhook: ""
  secret: ""

# ---------------------------------------------------------------
# 企业微信（预留）
# ---------------------------------------------------------------
wecom:
  enabled: false
  webhook: ""

# ---------------------------------------------------------------
# 邮件（预留）
# ---------------------------------------------------------------
email:
  enabled: false
  smtp_host: ""
  smtp_port: 465
  username: ""
  password: ""
  to: ""

# ---------------------------------------------------------------
# 推送内容设置
# ---------------------------------------------------------------
push_settings:
  daily_digest_time: "08:00"    # 每日简报推送时间
  collect_process_time: "09:30" # 主人勾选后批量处理时间
  max_items_per_push: 30        # 单次推送最大条目数
  include_trend: true           # 简报是否包含热点追踪
  include_collect: true         # 简报是否包含订阅源更新
