# =============================================================
# work-collect-v2 信息源配置
# 修改后下次执行自动生效，无需重启
# =============================================================

# ---------------------------------------------------------------
# DailyHot API 配置（国内平台聚合：微信/小红书/微博等）
# 部署方式见 docker/docker-compose.yml
# ---------------------------------------------------------------
dailyhot:
  base_url: "http://localhost:6688"  # 自部署实例地址
  enabled: true
  platforms:
    - weixin        # 微信公众号热文
    - xiaohongshu   # 小红书热榜
    - weibo         # 微博热搜
    - zhihu         # 知乎热榜
    - bilibili      # B站热搜
    - baidu         # 百度热搜
    - toutiao       # 今日头条
    - douyin        # 抖音热搜
    - ifeng         # 凤凰网
    # 如需添加更多平台，参考 DailyHot 文档，在此追加即可

