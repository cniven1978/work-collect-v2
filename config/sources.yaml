# ---------------------------------------------------------------
# X / Twitter（via Nitter RSS）
# 多个 Nitter 实例做容灾，自动切换
# ---------------------------------------------------------------
x_twitter:
  enabled: true
  nitter_instances:           # Nitter 公共实例列表，自动容灾切换
    - "https://nitter.net"
    - "https://nitter.privacydev.net"
    - "https://nitter.poast.org"
    - "https://bird.trom.tf"

  accounts:                   # 监控的固定账号（填 X 用户名，不含@）
    # 示例，请替换为你实际关注的账号：
    # - elonmusk
    # - OpenAI
    # - sama
    # 添加方式：在此列表追加一行 "- 用户名" 即可

  keywords:                   # 关键词追踪（X 搜索）
    # 示例，请替换为你实际追踪的关键词：
    # - "medical device AI"
    # - "medtech investment"
    # 添加方式：在此列表追加一行即可

# ---------------------------------------------------------------
# YouTube（via 官方 RSS，无需 API Key）
# RSS 格式：https://www.youtube.com/feeds/videos.xml?channel_id=频道ID
# ---------------------------------------------------------------
youtube:
  enabled: true
  channels:                   # 订阅的 YouTube 频道 ID 列表
    # 示例，请替换为你实际订阅的频道：
    # - UCxxxxxxxxxxxxxxxxxxxxxx
    # - UCyyyyyyyyyyyyyyyyyyyyyy
    # 添加方式：在此列表追加频道ID即可
    # 如何获取频道ID：打开频道页 → 右键查看源代码 → 搜索 "channel_id"

# ---------------------------------------------------------------
# 热点追踪配置
# ---------------------------------------------------------------
trend:
  mode: incremental           # current / incremental / digest
  top_n: 20                   # 每平台取前 N 条热点
  min_score: 0                # 最低热度门槛（0表示不过滤）
  dedup_window_hours: 24      # 去重窗口（小时），避免同一热点重复推送
